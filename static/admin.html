<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>AI聊天机器人管理面板</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            color: #1a1a2e;
        }

        /* ---- 顶栏 ---- */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 28px 32px 24px;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 1.5em;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .header-meta {
            font-size: 0.85em;
            opacity: 0.7;
        }

        /* ---- 统计卡片 ---- */
        .stats {
            max-width: 1200px;
            margin: -20px auto 0;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            position: relative;
            z-index: 1;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .stat-label {
            font-size: 0.8em;
            color: #8b95a5;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #1a1a2e;
        }
        .stat-value.text {
            font-size: 1.1em;
            font-weight: 500;
        }

        /* ---- 主内容 ---- */
        .main {
            max-width: 1200px;
            margin: 24px auto 0;
            padding: 0 20px 40px;
        }
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .toolbar h2 {
            font-size: 1.2em;
            font-weight: 600;
            color: #1a1a2e;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #0f3460;
            color: #fff;
        }
        .btn-primary:hover { background: #1a1a2e; }
        .btn-primary:active { transform: scale(0.97); }
        .btn .spin { display: none; animation: spin 1s linear infinite; }
        .btn.loading .spin { display: inline-block; }
        .btn.loading .icon { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---- 表格 ---- */
        .table-wrap {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            background: #fafbfc;
            color: #5a6577;
            font-size: 0.78em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 14px 16px;
            text-align: left;
            border-bottom: 2px solid #eef0f4;
            white-space: nowrap;
        }
        tbody td {
            padding: 14px 16px;
            border-bottom: 1px solid #f2f3f5;
            font-size: 0.92em;
            vertical-align: top;
        }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: #f8f9fb; }
        tbody tr:last-child td { border-bottom: none; }

        .phone { font-weight: 600; color: #1a1a2e; }
        .group-id {
            font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
            font-size: 0.85em;
            color: #5a6577;
            background: #f0f2f5;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .model-tag {
            display: inline-block;
            font-size: 0.8em;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
            background: linear-gradient(135deg, #e8f4f8, #d4ecf7);
            color: #0f3460;
        }
        .time-info { color: #8b95a5; font-size: 0.88em; }
        .duration {
            font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
            font-size: 0.85em;
            color: #8b95a5;
        }

        /* ---- 对话预览 ---- */
        .msg-toggle {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #0f3460;
            font-size: 0.85em;
            font-weight: 500;
            padding: 4px 0;
            border: none;
            background: none;
        }
        .msg-toggle:hover { color: #533483; }
        .msg-toggle svg { transition: transform 0.2s; }
        .msg-toggle.open svg { transform: rotate(90deg); }

        .messages-detail {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: #f8f9fb;
            border-radius: 10px;
            max-width: 480px;
        }
        .messages-detail.show { display: block; }
        .msg-more-btn {
            display: block;
            width: 100%;
            padding: 6px;
            margin-bottom: 8px;
            border: 1px dashed #b0b0b0;
            border-radius: 6px;
            background: #f0f0f5;
            color: #533483;
            font-size: 0.82em;
            cursor: pointer;
            text-align: center;
        }
        .msg-more-btn:hover { background: #e6e6f0; }
        .messages-older {
            border-bottom: 1px dashed #d0d0d0;
            margin-bottom: 8px;
            padding-bottom: 4px;
        }
        .msg-item {
            padding: 8px 12px;
            margin: 6px 0;
            border-radius: 8px;
            font-size: 0.88em;
            line-height: 1.5;
            word-break: break-word;
        }
        .msg-user {
            background: #e3f2fd;
            border-left: 3px solid #4a90d9;
            margin-right: 30px;
        }
        .msg-ai {
            background: #edf7ed;
            border-left: 3px solid #66bb6a;
            margin-right: 30px;
        }
        .msg-role {
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .msg-role-user { color: #1565c0; }
        .msg-role-ai { color: #2e7d32; }

        /* ---- 空状态 ---- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b95a5;
        }
        .empty-state svg { margin-bottom: 16px; opacity: 0.4; }
        .empty-state p { font-size: 1em; }

        /* ---- 页脚 ---- */
        .footer {
            text-align: center;
            padding: 20px;
            color: #b0b8c4;
            font-size: 0.82em;
        }

        /* ---- 响应式 ---- */
        @media (max-width: 768px) {
            .header { padding: 20px 16px; }
            .stats { padding: 0 12px; grid-template-columns: repeat(2, 1fr); }
            .main { padding: 0 12px 32px; }
            .table-wrap { overflow-x: auto; }
            table { min-width: 640px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <h1>AI 聊天机器人管理</h1>
        <span class="header-meta" id="update-time"></span>
    </div>
</div>

<div class="stats">
    <div class="stat-card">
        <div class="stat-label">活跃会话</div>
        <div class="stat-value" id="stat-sessions">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">默认模型</div>
        <div class="stat-value text" id="stat-model">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">自动刷新</div>
        <div class="stat-value text">30 秒</div>
    </div>
</div>

<div class="main">
    <div class="toolbar">
        <h2 id="table-title">活跃会话</h2>
        <button class="btn btn-primary" onclick="fetchData()" id="btn-refresh">
            <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            <svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 0 1 10 10"/></svg>
            刷新
        </button>
    </div>

    <div class="table-wrap">
        <div id="sessions-body">
            <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <p>加载中...</p>
            </div>
        </div>
    </div>
</div>

<div class="footer">AI 聊天机器人管理面板</div>

<script>
let refreshTimer = null;

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function formatDuration(seconds) {
    if (seconds < 60) return seconds + ' 秒前';
    if (seconds < 3600) return Math.floor(seconds / 60) + ' 分钟前';
    return Math.floor(seconds / 3600) + ' 小时前';
}

function toggleMessages(id, btn) {
    const el = document.getElementById(id);
    el.classList.toggle('show');
    btn.classList.toggle('open');
}

function toggleOlderMessages(id, btn) {
    const el = document.getElementById(id);
    if (el.style.display === 'none') {
        el.style.display = 'block';
        btn.textContent = '收起更早消息';
    } else {
        el.style.display = 'none';
        btn.textContent = btn.getAttribute('data-original-text');
    }
}


function renderSessions(data) {
    const sessions = data.sessions;
    const keys = Object.keys(sessions);
    document.getElementById('table-title').textContent = `活跃会话 (${keys.length})`;

    if (keys.length === 0) {
        return `<div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>当前没有活跃的会话</p>
        </div>`;
    }

    let html = `<table><thead><tr>
        <th>用户</th><th>群组</th><th>模型</th>
        <th>消息数</th><th>最后活跃</th><th>最近对话</th>
    </tr></thead><tbody>`;

    keys.forEach((phone, i) => {
        const info = sessions[phone];
        const msgId = `msg-${i}`;
        let msgCell = '<span class="time-info">无记录</span>';

        if (info.recent_messages && info.recent_messages.length > 0) {
            const msgs = info.recent_messages;
            const defaultShow = 4;
            const hasMore = msgs.length > defaultShow;
            const recentMsgs = hasMore ? msgs.slice(-defaultShow) : msgs;
            const olderMsgs = hasMore ? msgs.slice(0, -defaultShow) : [];

            let olderDetail = '';
            olderMsgs.forEach(msg => {
                const isUser = msg.role === 'user';
                const cls = isUser ? 'msg-user' : 'msg-ai';
                const roleLabel = isUser ? '用户' : '机器人';
                const roleClass = isUser ? 'msg-role-user' : 'msg-role-ai';
                olderDetail += `<div class="msg-item ${cls}"><div class="msg-role ${roleClass}">${roleLabel}</div><div>${escapeHtml(msg.content)}</div></div>`;
            });

            let recentDetail = '';
            recentMsgs.forEach(msg => {
                const isUser = msg.role === 'user';
                const cls = isUser ? 'msg-user' : 'msg-ai';
                const roleLabel = isUser ? '用户' : '机器人';
                const roleClass = isUser ? 'msg-role-user' : 'msg-role-ai';
                recentDetail += `<div class="msg-item ${cls}"><div class="msg-role ${roleClass}">${roleLabel}</div><div>${escapeHtml(msg.content)}</div></div>`;
            });

            const moreBtnText = `查看更早的 ${olderMsgs.length} 条消息`;
            const moreBtn = hasMore ? `<button class="msg-more-btn" data-original-text="${moreBtnText}" onclick="toggleOlderMessages('${msgId}-older', this)">${moreBtnText}</button>` : '';
            const olderDiv = hasMore ? `<div class="messages-older" id="${msgId}-older" style="display:none">${olderDetail}</div>` : '';

            msgCell = `<button class="msg-toggle" onclick="toggleMessages('${msgId}', this)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5l10 7-10 7z"/></svg>
                查看对话
            </button>
            <div class="messages-detail" id="${msgId}">${moreBtn}${olderDiv}${recentDetail}</div>`;
        }

        html += `<tr>
            <td><span class="phone">${escapeHtml(phone)}</span></td>
            <td><span class="group-id">${escapeHtml(info.group_id || '-')}</span></td>
            <td><span class="model-tag">${escapeHtml(info.model || '-')}</span></td>
            <td>${info.message_count}</td>
            <td>
                <div class="time-info">${escapeHtml(info.last_active)}</div>
                <div class="duration">${formatDuration(info.active_duration)}</div>
            </td>
            <td>${msgCell}</td>
        </tr>`;
    });

    html += '</tbody></table>';
    return html;
}

async function fetchData() {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('loading');

    try {
        const res = await fetch('/admin/api');
        if (res.status === 401) {
            document.getElementById('sessions-body').innerHTML =
                '<div class="empty-state"><p>认证失败，请刷新页面重新登录</p></div>';
            return;
        }
        const data = await res.json();

        document.getElementById('stat-sessions').textContent = data.active_sessions;
        document.getElementById('stat-model').textContent = data.default_model;
        document.getElementById('update-time').textContent = '更新于 ' + data.current_time;
        document.getElementById('sessions-body').innerHTML = renderSessions(data);
    } catch (e) {
        document.getElementById('sessions-body').innerHTML =
            `<div class="empty-state"><p>加载失败: ${escapeHtml(e.message)}</p></div>`;
    } finally {
        btn.classList.remove('loading');
    }
}

fetchData();
refreshTimer = setInterval(fetchData, 30000);
</script>
</body>
</html>
